<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ダッシュボード｜フィールドチーム店舗管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#2563EB;--accent2:#e60039;--gold:#fbca7a;--navy:#004f8a;
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;
  --text:#0F172A;--sub:#475569;--muted:#94A3B8;
  --success:#059669;--warning:#D97706;--danger:#DC2626;
  --fs-xs:12px;--fs-sm:13px;--fs-md:14px;--fs-lg:16px;--fs-xl:20px;--fs-2xl:28px;--fs-3xl:36px;
}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── ヘッダー ── */
.header{background:var(--navy);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.h-logo{display:flex;align-items:center;gap:10px;color:#fff;font-size:var(--fs-lg);font-weight:600;}
.h-logo i{font-size:22px;color:var(--gold);}
.h-right{display:flex;align-items:center;gap:16px;}
.h-sync{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:rgba(255,255,255,.7);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.sdot.ok{background:#4ADE80;}.sdot.err{background:#F87171;}.sdot.spin{background:#FCD34D;}
.reload-btn{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:.2s;}
.reload-btn:hover{background:rgba(255,255,255,.2);}
.back-btn{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:rgba(255,255,255,.7);text-decoration:none;transition:.2s;}
.back-btn:hover{color:#fff;}

/* ── フィールダー切り替えタブ ── */
.fielder-tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:99;}
.fielder-tabs::-webkit-scrollbar{display:none;}
.ftab{display:flex;align-items:center;gap:7px;padding:14px 16px;font-size:var(--fs-sm);font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:.15s;}
.ftab:hover{color:var(--text);}
.ftab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.ftab-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.ftab-all{font-size:18px;}

/* ── レイアウト ── */
.main{padding:28px 32px;max-width:1400px;margin:0 auto;}
.section-title{font-size:var(--fs-xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}

/* ── KPIグリッド ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px;}
.kpi-card{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--border);position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.blue::before{background:var(--accent);}
.kpi-card.red::before{background:var(--accent2);}
.kpi-card.green::before{background:var(--success);}
.kpi-card.orange::before{background:var(--warning);}
.kpi-card.navy::before{background:var(--navy);}
.kpi-card.gold::before{background:var(--gold);}
.kpi-icon{font-size:20px;margin-bottom:10px;}
.kpi-card.blue .kpi-icon{color:var(--accent);}
.kpi-card.red .kpi-icon{color:var(--accent2);}
.kpi-card.green .kpi-icon{color:var(--success);}
.kpi-card.orange .kpi-icon{color:var(--warning);}
.kpi-card.navy .kpi-icon{color:var(--navy);}
.kpi-card.gold .kpi-icon{color:#B45309;}
.kpi-val{font-size:var(--fs-3xl);font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;}
.kpi-lbl{font-size:var(--fs-xs);color:var(--muted);font-weight:500;}
.kpi-sub{font-size:var(--fs-xs);color:var(--sub);margin-top:4px;}

/* ── 2カラムレイアウト ── */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.row3{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}

/* ── パネル ── */
.panel{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:var(--fs-md);font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.panel-title i{font-size:18px;color:var(--accent);}
.panel-body{padding:20px;}

/* ── フィールダー別テーブル ── */
.fielder-table{width:100%;border-collapse:collapse;}
.fielder-table th{font-size:var(--fs-xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);}
.fielder-table td{padding:12px 12px;border-bottom:1px solid #F1F5F9;font-size:var(--fs-sm);vertical-align:middle;}
.fielder-table tr:last-child td{border-bottom:none;}
.fielder-table tr:hover td{background:#F8FAFC;}
.f-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.f-cell{display:flex;align-items:center;gap:10px;}
.f-name{font-weight:600;color:var(--text);}
.prog-bar{height:6px;border-radius:99px;background:#E2E8F0;overflow:hidden;flex:1;min-width:60px;}
.prog-fill{height:100%;border-radius:99px;background:var(--accent);transition:.5s;}
.num-badge{display:inline-block;font-size:var(--fs-xs);font-weight:700;padding:3px 10px;border-radius:99px;min-width:36px;text-align:center;}
.nb-blue{background:#DBEAFE;color:#1E40AF;}
.nb-green{background:#D1FAE5;color:#065F46;}
.nb-orange{background:#FEF3C7;color:#92400E;}
.nb-red{background:#FEE2E2;color:#991B1B;}
.nb-gray{background:#F1F5F9;color:var(--sub);}

/* ── 目標別・ランク別 ── */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.goal-item{border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.gi-label{font-size:var(--fs-sm);font-weight:500;}
.gi-val{font-size:var(--fs-xl);font-weight:700;}
.gi0{background:#DBEAFE;}.gi0 .gi-label{color:#1E40AF;}.gi0 .gi-val{color:#1E40AF;}
.gi1{background:#D1FAE5;}.gi1 .gi-label{color:#065F46;}.gi1 .gi-val{color:#065F46;}
.gi2{background:#FEF3C7;}.gi2 .gi-label{color:#92400E;}.gi2 .gi-val{color:#92400E;}
.gi3{background:#EDE9FE;}.gi3 .gi-label{color:#5B21B6;}.gi3 .gi-val{color:#5B21B6;}

/* ── 訪問結果バー ── */
.result-list{display:flex;flex-direction:column;gap:10px;}
.res-item{display:flex;align-items:center;gap:12px;}
.res-label{font-size:var(--fs-sm);color:var(--sub);min-width:80px;}
.res-bar{flex:1;height:8px;border-radius:99px;background:#E2E8F0;overflow:hidden;}
.res-fill{height:100%;border-radius:99px;}
.rf-s{background:var(--success);}
.rf-p{background:var(--warning);}
.rf-f{background:var(--danger);}
.res-num{font-size:var(--fs-sm);font-weight:600;color:var(--text);min-width:36px;text-align:right;}
.res-pct{font-size:var(--fs-xs);color:var(--muted);min-width:36px;text-align:right;}

/* ── 停滞店舗リスト ── */
.stagnant-list{display:flex;flex-direction:column;gap:8px;}
.stag-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:#FFF7ED;border:1px solid #FED7AA;}
.stag-item.danger{background:#FFF1F2;border-color:#FECDD3;}
.stag-left{display:flex;flex-direction:column;gap:3px;}
.stag-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);}
.stag-sub{font-size:var(--fs-xs);color:var(--sub);}
.stag-days{font-size:var(--fs-lg);font-weight:700;color:var(--warning);}
.stag-item.danger .stag-days{color:var(--danger);}
.stag-unit{font-size:var(--fs-xs);color:var(--muted);}

/* ── ランク別フェーズ ── */
.rank-table{width:100%;border-collapse:collapse;}
.rank-table th{font-size:var(--fs-xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:8px 10px;text-align:center;border-bottom:2px solid var(--border);}
.rank-table th:first-child{text-align:left;}
.rank-table td{padding:10px 10px;border-bottom:1px solid #F1F5F9;font-size:var(--fs-sm);text-align:center;}
.rank-table td:first-child{font-weight:600;text-align:left;}
.rank-table tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:var(--fs-xs);padding:2px 8px;border-radius:99px;}
.rS{background:#FEF3C7;color:#92400E;}
.rA{background:#D1FAE5;color:#065F46;}.rB{background:#DBEAFE;color:#1E40AF;}
.rC,.rD,.rE{background:#F1F5F9;color:var(--sub);}

/* ── フィールダー個別ビュー ── */
.store-list-panel{display:flex;flex-direction:column;gap:8px;}
.store-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#F8FAFC;border-radius:10px;border:1px solid var(--border);}
.store-row-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);}
.store-row-sub{font-size:var(--fs-xs);color:var(--muted);margin-top:2px;}
.store-row-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ── ローディング ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:var(--fs-md);}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #E2E8F0;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 空状態 ── */
.empty{text-align:center;padding:32px;color:var(--muted);font-size:var(--fs-sm);}

/* ── 更新日時 ── */
.update-time{font-size:var(--fs-xs);color:var(--muted);}

/* ══════════════════════════════════
   スマホ用ビュー（768px以下）
══════════════════════════════════ */
/* スマホ専用要素はデフォルト非表示 */
.sp-only{display:none;}
.pc-only{display:block;}

@media(max-width:768px){
  /* PC専用要素を非表示 */
  .pc-only{display:none !important;}
  /* スマホ専用要素を表示 */
  .sp-only{display:block;}

  /* ヘッダー */
  .header{padding:0 14px;height:50px;}
  .h-logo{font-size:13px;}
  .h-logo i{font-size:18px;}
  .h-right{gap:8px;}
  .reload-btn span{display:none;}
  .reload-btn{padding:6px 10px;}
  .back-btn span{display:none;}

  /* フィールダータブ */
  .fielder-tabs{padding:0 8px;}
  .ftab{padding:11px 10px;font-size:11px;gap:5px;}

  /* メインレイアウト */
  .main{padding:12px;}
  .row2,.row3{grid-template-columns:1fr;gap:12px;}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .kpi-card{padding:12px 14px;}
  .kpi-val{font-size:24px;}

  /* パネル */
  .panel-body{padding:12px 14px;}
  .panel-head{padding:12px 14px;}

  /* テーブル→カード形式 */
  .fielder-table thead{display:none;}
  .fielder-table tr{display:block;background:#F8FAFC;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;padding:12px 14px;}
  .fielder-table td{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid #F1F5F9;font-size:12px;}
  .fielder-table td:last-child{border-bottom:none;}
  .fielder-table td::before{content:attr(data-label);font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0;margin-right:8px;}
  .f-cell{justify-content:flex-end;}

  /* ランクテーブル */
  .rank-table{font-size:11px;}
  .rank-table th,.rank-table td{padding:7px 6px;}

  /* 停滞店舗 */
  .stag-name{font-size:12px;}
  .stag-sub{font-size:11px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="h-logo">
    <i class="ti ti-chart-bar"></i>
    管理者ダッシュボード
  </div>
  <div class="h-right">
    <div class="h-sync">
      <div class="sdot" id="sdot"></div>
      <span id="stext">読み込み中...</span>
    </div>
    <button class="reload-btn" onclick="loadAll()">
      <i class="ti ti-refresh"></i> <span>再読み込み</span>
    </button>
    <a class="back-btn" href="index.html">
      <i class="ti ti-arrow-left"></i> <span>アプリに戻る</span>
    </a>
    <a class="back-btn" href="senior.html" id="back-to-senior" style="display:none;">
      <i class="ti ti-users"></i> <span>同行記録に戻る</span>
    </a>
  </div>
</div>

<!-- フィールダー切り替えタブ -->
<div class="fielder-tabs" id="fielder-tabs">
  <button class="ftab active" onclick="selectFielder(null)" id="ftab-all">
    <i class="ti ti-layout-grid ftab-all"></i> チーム全体
  </button>
</div>

<div class="main">
  <!-- セクションタイトル -->
  <div class="section-title" id="section-title"><i class="ti ti-layout-grid"></i> チーム全体</div>

  <!-- KPIカード -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="loading" style="grid-column:span 6;">
      <div class="spinner"></div><br>データを読み込んでいます...
    </div>
  </div>

  <!-- フィールダー別（チーム全体時のみ表示） -->
  <div id="team-only-section">
    <div class="row2">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><i class="ti ti-users"></i> フィールダー別 活動状況</div>
          <span class="update-time" id="update-time"></span>
        </div>
        <div class="panel-body" id="fielder-panel">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title"><i class="ti ti-check"></i> 訪問結果の内訳</div>
        </div>
        <div class="panel-body" id="result-panel">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 停滞店舗 & 目標別 -->
  <div class="row3">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><i class="ti ti-alert-triangle" style="color:var(--warning);"></i> 停滞店舗（30日以上未訪問）</div>
        <span id="stagnant-count" style="font-size:var(--fs-xs);color:var(--muted);"></span>
      </div>
      <div class="panel-body" id="stagnant-panel">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><i class="ti ti-target"></i> 目標別 件数</div>
      </div>
      <div class="panel-body" id="goal-panel">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- ランク別フェーズ -->
  <div class="panel" style="margin-bottom:20px;">
    <div class="panel-head">
      <div class="panel-title"><i class="ti ti-table"></i> 売上ランク × フェーズ進捗</div>
    </div>
    <div class="panel-body" id="rank-panel">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- 個別フィールダー：担当店舗一覧（フィールダー選択時のみ表示） -->
  <div id="fielder-only-section" style="display:none;">
    <div class="panel" style="margin-bottom:20px;">
      <div class="panel-head">
        <div class="panel-title"><i class="ti ti-building-store"></i> 担当店舗一覧</div>
        <span id="store-count" style="font-size:var(--fs-xs);color:var(--muted);"></span>
      </div>
      <div class="panel-body" id="store-list-panel">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div style="height:32px;"></div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbxpnXDwE36Wsk5-RNDvwgWJFdmi8MUEgj0Acbx-nZGENv-tSnUKpgEp14CaoFyJKJPq/exec';
const GOALS=['平台獲得','売場改善','多面展開','取り扱いアイテム増'];
const GCLS=['gi0','gi1','gi2','gi3'];
const RANKS=['S','A','B','C','D','E'];
const AVATAR_COLORS=[
  {color:'#DBEAFE',tc:'#1E40AF'},{color:'#D1FAE5',tc:'#065F46'},
  {color:'#FEF3C7',tc:'#92400E'},{color:'#EDE9FE',tc:'#5B21B6'},
  {color:'#FCE7F3',tc:'#9D174D'},{color:'#E0F2FE',tc:'#0C4A6E'},
  {color:'#FFEDD5',tc:'#9A3412'},{color:'#DCFCE7',tc:'#166534'},
];

let stores=[], records=[], sInfo=[];
let currentFielder=null; // null=チーム全体、string=フィールダー名

function setSyncDot(state,msg){
  const d=document.getElementById('sdot');
  const t=document.getElementById('stext');
  if(d)d.className='sdot '+state;
  if(t)t.textContent=msg;
}

function initials(n){return n.replace(/\s/g,'').slice(0,2);}

function fmtDate(v){
  if(!v)return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(v)))return String(v);
  const d=new Date(v);
  if(isNaN(d.getTime()))return String(v);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function daysSince(dateStr){
  if(!dateStr)return null;
  const d=new Date(fmtDate(dateStr));
  if(isNaN(d.getTime()))return null;
  return Math.floor((Date.now()-d.getTime())/(1000*60*60*24));
}

function fmtNum(v){
  return v?Number(String(v).replace(/,/g,'')).toLocaleString('ja-JP')||v:null;
}

async function loadAll(){
  setSyncDot('spin','読み込み中...');
  try{
    const [storesRes, recordsRes, infoRes] = await Promise.all([
      fetch(GAS+'?action=getStores').then(r=>r.json()),
      fetch(GAS+'?action=getRecords&fielder=').then(r=>r.json()),
      fetch(GAS+'?action=getStoreInfo').then(r=>r.json()),
    ]);
    stores = storesRes.stores || [];
    records = (recordsRes.records || []).map(r=>({
      ...r,
      date: fmtDate(r.date),
      goalIdx: GOALS.indexOf(r.goal)
    }));
    sInfo = infoRes.info || [];

    setSyncDot('ok','更新：'+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}));
    document.getElementById('update-time').textContent=
      new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+'現在';

    buildTabs();
    renderAll();
  }catch(e){
    setSyncDot('err','読み込みエラー');
    console.error(e);
  }
}

// フィールダータブを動的生成
function buildTabs(){
  const seen=new Set();
  const fielders=[];
  stores.forEach(s=>{
    if(s.pic&&!seen.has(s.pic)){seen.add(s.pic);fielders.push(s.pic);}
  });

  const tabs=document.getElementById('fielder-tabs');
  // チーム全体タブは残してフィールダータブを再生成
  tabs.innerHTML=`<button class="ftab${currentFielder===null?' active':''}" onclick="selectFielder(null)">
    <i class="ti ti-layout-grid" style="font-size:18px;"></i> チーム全体
  </button>`;

  fielders.forEach((name,i)=>{
    const col=AVATAR_COLORS[i%AVATAR_COLORS.length];
    tabs.innerHTML+=`<button class="ftab${currentFielder===name?' active':''}" onclick="selectFielder('${name.replace(/'/g,"\\'")}')">
      <div class="ftab-avatar" style="background:${col.color};color:${col.tc};">${initials(name)}</div>
      ${name}
    </button>`;
  });
}

function selectFielder(name){
  currentFielder=name;
  // タブのactive切り替え
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  const tabs=document.querySelectorAll('.ftab');
  tabs.forEach(t=>{
    if(name===null&&t.textContent.includes('チーム全体'))t.classList.add('active');
    if(name!==null&&t.textContent.includes(name))t.classList.add('active');
  });
  renderAll();
}

function getFilteredStores(){
  if(currentFielder===null)return stores;
  return stores.filter(s=>s.pic===currentFielder);
}

function getFilteredRecords(){
  if(currentFielder===null)return records;
  return records.filter(r=>r.fielder===currentFielder);
}

function getInfoMap(){
  const map={};
  sInfo.forEach(item=>{
    map[item.storeName]={
      goal: GOALS.indexOf(item.goal),
      phase: Number(item.phase||0),
      lastVisit: fmtDate(item.lastVisit||''),
      fielder: item.fielder||''
    };
  });
  return map;
}

function renderAll(){
  const label=currentFielder||'チーム全体';
  document.getElementById('section-title').innerHTML=
    currentFielder
      ? `<i class="ti ti-user"></i> ${currentFielder} のダッシュボード`
      : `<i class="ti ti-layout-grid"></i> チーム全体`;

  // フィールダー別テーブルはチーム全体時のみ表示
  document.getElementById('team-only-section').style.display=currentFielder?'none':'block';
  document.getElementById('fielder-only-section').style.display=currentFielder?'block':'none';

  renderKPI();
  if(!currentFielder){
    renderFielder();
    renderResult();
  } else {
    renderStoreList();
    renderResult(); // 個別でも結果内訳は見せる
  }
  renderStagnant();
  renderGoal();
  renderRank();
}

function renderKPI(){
  const filtStores=getFilteredStores();
  const filtRecs=getFilteredRecords();
  const infoMap=getInfoMap();
  const total=filtStores.length;
  const withGoal=filtStores.filter(s=>infoMap[s.name]&&infoMap[s.name].goal>=0).length;
  const ph3up=filtStores.filter(s=>infoMap[s.name]&&infoMap[s.name].phase>=3).length;
  const ph5=filtStores.filter(s=>infoMap[s.name]&&infoMap[s.name].phase>=5).length;
  const totalRec=filtRecs.length;
  const agreed=filtRecs.filter(r=>r.result==='合意・達成'||r.result==='s').length;

  document.getElementById('kpi-grid').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-icon"><i class="ti ti-building-store"></i></div><div class="kpi-val">${total}</div><div class="kpi-lbl">${currentFielder?'担当店舗数':'総店舗数'}</div></div>
    <div class="kpi-card navy"><div class="kpi-icon"><i class="ti ti-target"></i></div><div class="kpi-val">${withGoal}</div><div class="kpi-lbl">目標設定済</div><div class="kpi-sub">未設定 ${total-withGoal}件</div></div>
    <div class="kpi-card orange"><div class="kpi-icon"><i class="ti ti-stairs-up"></i></div><div class="kpi-val">${ph3up}</div><div class="kpi-lbl">提案中（Ph.03〜）</div><div class="kpi-sub">全体の${Math.round(ph3up/Math.max(total,1)*100)}%</div></div>
    <div class="kpi-card green"><div class="kpi-icon"><i class="ti ti-circle-check"></i></div><div class="kpi-val">${ph5}</div><div class="kpi-lbl">実施完了</div><div class="kpi-sub">${Math.round(ph5/Math.max(total,1)*100)}%</div></div>
    <div class="kpi-card blue"><div class="kpi-icon"><i class="ti ti-clipboard-list"></i></div><div class="kpi-val">${totalRec}</div><div class="kpi-lbl">総訪問件数</div></div>
    <div class="kpi-card red"><div class="kpi-icon"><i class="ti ti-thumb-up"></i></div><div class="kpi-val">${agreed}</div><div class="kpi-lbl">合意・達成</div><div class="kpi-sub">訪問の${Math.round(agreed/Math.max(totalRec,1)*100)}%</div></div>
  `;
}

function renderFielder(){
  const fielderSet={};
  stores.forEach(s=>{
    const pic=s.pic||'未設定';
    if(!fielderSet[pic])fielderSet[pic]={stores:0,rec:0,ph3:0,ph5:0};
    fielderSet[pic].stores++;
  });
  records.forEach(r=>{
    const f=r.fielder||'未設定';
    if(!fielderSet[f])fielderSet[f]={stores:0,rec:0,ph3:0,ph5:0};
    fielderSet[f].rec++;
  });
  const infoMap=getInfoMap();
  stores.forEach(s=>{
    const pic=s.pic||'未設定';
    const info=infoMap[s.name];
    if(info&&fielderSet[pic]){
      if(info.phase>=3)fielderSet[pic].ph3++;
      if(info.phase>=5)fielderSet[pic].ph5++;
    }
  });

  const list=Object.entries(fielderSet)
    .filter(([k])=>k!=='未設定')
    .sort((a,b)=>b[1].rec-a[1].rec);

  if(!list.length){
    document.getElementById('fielder-panel').innerHTML='<div class="empty">データがありません</div>';return;
  }
  const maxRec=Math.max(...list.map(([,v])=>v.rec),1);

  document.getElementById('fielder-panel').innerHTML=`
    <table class="fielder-table">
      <thead><tr>
        <th>フィールダー</th>
        <th>担当店舗</th>
        <th>訪問件数</th>
        <th style="min-width:120px;">進捗バー</th>
        <th>Ph.03〜</th>
        <th>完了</th>
      </tr></thead>
      <tbody>
        ${list.map(([name,v],i)=>{
          const col=AVATAR_COLORS[i%AVATAR_COLORS.length];
          return`<tr style="cursor:pointer;" onclick="selectFielder('${name.replace(/'/g,"\\'")}')">
            <td data-label=""><div class="f-cell">
              <div class="f-avatar" style="background:${col.color};color:${col.tc};">${initials(name)}</div>
              <span class="f-name">${name}</span>
            </div></td>
            <td data-label="担当店舗"><span class="num-badge nb-gray">${v.stores}</span></td>
            <td data-label="訪問件数"><span class="num-badge nb-blue">${v.rec}</span></td>
            <td data-label="進捗"><div style="display:flex;align-items:center;gap:8px;">
              <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(v.rec/maxRec*100)}%;"></div></div>
              <span style="font-size:var(--fs-xs);color:var(--muted);min-width:28px;">${v.rec}件</span>
            </div></td>
            <td data-label="Ph.03〜"><span class="num-badge nb-orange">${v.ph3}</span></td>
            <td data-label="完了"><span class="num-badge nb-green">${v.ph5}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function renderResult(){
  const filtRecs=getFilteredRecords();
  const total=filtRecs.length;
  const agreed=filtRecs.filter(r=>r.result==='合意・達成'||r.result==='s').length;
  const pending=filtRecs.filter(r=>r.result==='検討中'||r.result==='p').length;
  const passed=filtRecs.filter(r=>r.result==='見送り'||r.result==='f').length;
  const none=total-agreed-pending-passed;

  const items=[
    {label:'合意・達成',val:agreed,cls:'rf-s',nbcls:'nb-green'},
    {label:'検討中',val:pending,cls:'rf-p',nbcls:'nb-orange'},
    {label:'見送り',val:passed,cls:'rf-f',nbcls:'nb-red'},
    {label:'結果未記録',val:none,cls:'',nbcls:'nb-gray'},
  ];

  // フィールダー個別時は訪問結果をrow3の右側に差し込む
  const panelId=currentFielder?'result-panel-fielder':'result-panel';
  const targetEl=document.getElementById('result-panel');
  if(!targetEl)return;

  targetEl.innerHTML=`
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:var(--fs-3xl);font-weight:700;color:var(--text);">${total}</div>
      <div style="font-size:var(--fs-xs);color:var(--muted);margin-top:2px;">総訪問記録数</div>
    </div>
    <div class="result-list">
      ${items.map(it=>`
        <div class="res-item">
          <div class="res-label">${it.label}</div>
          <div class="res-bar"><div class="res-fill ${it.cls}" style="width:${Math.round(it.val/Math.max(total,1)*100)}%;"></div></div>
          <div class="res-num"><span class="num-badge ${it.nbcls}">${it.val}</span></div>
          <div class="res-pct">${Math.round(it.val/Math.max(total,1)*100)}%</div>
        </div>`).join('')}
    </div>`;
}

function renderStagnant(){
  const infoMap=getInfoMap();
  const filtStores=getFilteredStores();

  const stagnant=filtStores
    .map(s=>{
      const info=infoMap[s.name];
      const lastVisit=info?info.lastVisit:'';
      const days=daysSince(lastVisit);
      return{name:s.name,chain:s.chain,pic:s.pic,phase:info?info.phase:0,lastVisit,days};
    })
    .filter(s=>s.days===null||s.days>=30)
    .sort((a,b)=>(b.days||9999)-(a.days||9999))
    .slice(0,10);

  document.getElementById('stagnant-count').textContent=`${stagnant.length}件`;

  if(!stagnant.length){
    document.getElementById('stagnant-panel').innerHTML='<div class="empty"><i class="ti ti-circle-check" style="font-size:32px;color:var(--success);display:block;margin-bottom:8px;"></i>停滞店舗はありません</div>';
    return;
  }

  document.getElementById('stagnant-panel').innerHTML=`
    <div class="stagnant-list">
      ${stagnant.map(s=>`
        <div class="stag-item${s.days===null||s.days>=60?' danger':''}" onclick="openStore(this.dataset.name)" data-name="${s.name}" style="cursor:pointer;">
          <div class="stag-left">
            <div class="stag-name">${s.name}</div>
            <div class="stag-sub">${s.chain?s.chain+' ／ ':''}${s.pic||'担当未設定'}${s.phase?'　Ph.'+s.phase:''}</div>
          </div>
          <div style="text-align:right;">
            <div class="stag-days">${s.days===null?'—':s.days}</div>
            <div class="stag-unit">日未訪問</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function renderGoal(){
  const infoMap=getInfoMap();
  const filtStores=getFilteredStores();
  const counts=GOALS.map((_,i)=>filtStores.filter(s=>infoMap[s.name]&&infoMap[s.name].goal===i).length);

  document.getElementById('goal-panel').innerHTML=`
    <div class="goal-grid">
      ${GOALS.map((g,i)=>`
        <div class="goal-item ${GCLS[i]}">
          <div class="gi-label">${g}</div>
          <div class="gi-val">${counts[i]}</div>
        </div>`).join('')}
    </div>`;
}

function renderRank(){
  const infoMap=getInfoMap();
  const filtStores=getFilteredStores();

  const data=RANKS.map(rank=>{
    const rankStores=filtStores.filter(s=>s.rank===rank);
    const total=rankStores.length;
    if(!total)return{rank,total,ph0:0,ph1_2:0,ph3_4:0,ph5:0};
    const ph0=rankStores.filter(s=>!infoMap[s.name]||infoMap[s.name].phase===0).length;
    const ph1_2=rankStores.filter(s=>infoMap[s.name]&&infoMap[s.name].phase>=1&&infoMap[s.name].phase<=2).length;
    const ph3_4=rankStores.filter(s=>infoMap[s.name]&&infoMap[s.name].phase>=3&&infoMap[s.name].phase<=4).length;
    const ph5=rankStores.filter(s=>infoMap[s.name]&&infoMap[s.name].phase>=5).length;
    return{rank,total,ph0,ph1_2,ph3_4,ph5};
  }).filter(d=>d.total>0);

  if(!data.length){
    document.getElementById('rank-panel').innerHTML='<div class="empty">データがありません</div>';return;
  }

  document.getElementById('rank-panel').innerHTML=`
    <table class="rank-table">
      <thead><tr>
        <th>ランク</th>
        <th>店舗数</th>
        <th>未着手</th>
        <th>Ph.01〜02<br><span style="font-weight:400;color:var(--muted);">課題整理</span></th>
        <th>Ph.03〜04<br><span style="font-weight:400;color:var(--muted);">提案中</span></th>
        <th>Ph.05<br><span style="font-weight:400;color:var(--muted);">完了</span></th>
        <th>完了率</th>
      </tr></thead>
      <tbody>
        ${data.map(d=>`<tr>
          <td><span class="badge r${d.rank}">${d.rank}</span></td>
          <td><strong>${d.total}</strong></td>
          <td><span class="num-badge nb-gray">${d.ph0}</span></td>
          <td><span class="num-badge nb-blue">${d.ph1_2}</span></td>
          <td><span class="num-badge nb-orange">${d.ph3_4}</span></td>
          <td><span class="num-badge nb-green">${d.ph5}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="prog-bar" style="min-width:60px;"><div class="prog-fill" style="width:${Math.round(d.ph5/d.total*100)}%;background:var(--success);"></div></div>
              <span style="font-size:var(--fs-xs);color:var(--muted);">${Math.round(d.ph5/d.total*100)}%</span>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderStoreList(){
  const infoMap=getInfoMap();
  const filtStores=getFilteredStores();
  const panel=document.getElementById('store-list-panel');
  const countEl=document.getElementById('store-count');
  if(countEl)countEl.textContent=`${filtStores.length}件`;

  if(!filtStores.length){
    panel.innerHTML='<div class="empty">担当店舗がありません</div>';return;
  }

  // フェーズ順にソート（高い順）
  const sorted=[...filtStores].sort((a,b)=>{
    const pa=infoMap[a.name]?infoMap[a.name].phase:0;
    const pb=infoMap[b.name]?infoMap[b.name].phase:0;
    return pb-pa;
  });

  const priCls=p=>p==='第1優先'?'background:#FEE2E2;color:#991B1B;':p==='第2優先'?'background:#FEF3C7;color:#92400E;':'background:#F1F5F9;color:#64748B;';

  panel.innerHTML=sorted.map(s=>{
    const info=infoMap[s.name]||{};
    const goalText=info.goal>=0?GOALS[info.goal]:'未設定';
    const goalCls=info.goal>=0?['gi0','gi1','gi2','gi3'][info.goal]:'';
    return`<div class="store-row" onclick="openStore(this.dataset.name)" data-name="${s.name}" style="cursor:pointer;">
      <div style="flex:1;min-width:0;">
        <div class="store-row-name">${s.name}</div>
        <div class="store-row-sub">${s.chain||''}${s.rank?' ／ ランク'+s.rank:''}</div>
      </div>
      <div class="store-row-right">
        ${s.priority?`<span style="font-size:11px;padding:2px 8px;border-radius:99px;${priCls(s.priority)}">${s.priority}</span>`:''}
        ${info.phase?`<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#F1F5F9;color:#475569;">Ph.${info.phase}</span>`:'<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#F1F5F9;color:#94A3B8;">未着手</span>'}
        ${info.lastVisit?`<span style="font-size:11px;color:#94A3B8;">${fmtDate(info.lastVisit)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function openStore(name){
  window.location.href='index.html?store='+encodeURIComponent(name);
}

loadAll().then(()=>{
  const params=new URLSearchParams(window.location.search);
  const fielder=params.get('fielder');
  if(fielder){
    // senior.htmlからの遷移：同行記録に戻るボタンを表示
    const backSenior=document.getElementById('back-to-senior');
    const backIndex=document.querySelector('.back-btn[href="index.html"]');
    if(backSenior)backSenior.style.display='flex';
    if(backIndex)backIndex.style.display='none';
    selectFielder(fielder);
    window.history.replaceState({},'',window.location.pathname);
  }
});
</script>
</body>
</html>
