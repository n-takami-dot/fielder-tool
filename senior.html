<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="同行記録">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<title>同行記録</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#004f8a;--accent-light:#EFF6FF;
  --text:#111;--sub:#6B7280;--muted:#9CA3AF;--border:#E5E7EB;--bg:#F9FAFB;--card:#fff;
  --fs-xs:13px;--fs-sm:15px;--fs-md:17px;--fs-lg:19px;
  --ok:#059669;--warn:#D97706;--ng:#DC2626;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);min-height:100vh;font-size:var(--fs-md);}
.screen{display:none;}.screen.active{display:block;}
.view{display:none;}.view.active{display:block;}

/* ── ログイン ── */
.login-wrap{padding:2rem 1rem;max-width:420px;margin:0 auto;}
.login-card{background:var(--card);border-radius:16px;padding:1.5rem;border:0.5px solid var(--border);}
.login-title{font-size:var(--fs-lg);font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.login-sub{font-size:var(--fs-sm);color:var(--sub);margin-bottom:1.5rem;line-height:1.7;}
.senior-grid{display:flex;flex-direction:column;gap:10px;}
.s-btn{padding:14px 16px;border:0.5px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:var(--fs-md);font-weight:500;color:var(--text);}
.s-btn:active{background:var(--accent-light);}
.s-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}

/* ── トップバー ── */
.topbar{background:var(--accent);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.t-logo{font-size:var(--fs-md);font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);}
.sdot.ok{background:#4ADE80;}.sdot.err{background:#F87171;}.sdot.spin{background:#FCD34D;}
.stext{font-size:var(--fs-xs);color:rgba(255,255,255,.7);}
.t-switch{font-size:var(--fs-xs);padding:5px 10px;border:0.5px solid rgba(255,255,255,.4);border-radius:99px;background:transparent;color:#fff;cursor:pointer;white-space:nowrap;}

/* ── タブナビ ── */
.tabnav{background:var(--card);border-bottom:0.5px solid var(--border);display:flex;position:sticky;top:44px;z-index:9;}
.tnb{flex:1;font-size:var(--fs-xs);padding:10px 4px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tnb i{font-size:20px;}
.tnb.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* ── 共通 ── */
.page{padding:14px;}
.rec-sec{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.sec-hd{font-size:var(--fs-xs);font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid #F3F4F6;display:flex;align-items:center;gap:6px;}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{font-size:var(--fs-sm);color:var(--sub);font-weight:500;}
.field input,.field select,.field textarea{font-size:17px;padding:12px 14px;border:0.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);width:100%;-webkit-appearance:none;}
.field input[readonly]{background:var(--bg);color:var(--sub);}
.field textarea{resize:vertical;min-height:86px;line-height:1.7;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── チェック項目 ── */
.check-item{margin-bottom:16px;}
.check-item:last-child{margin-bottom:0;}
.check-label{font-size:var(--fs-sm);color:var(--text);font-weight:500;margin-bottom:10px;line-height:1.6;}
.check-btns{display:flex;gap:8px;}
.chk-btn{flex:1;padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-size:var(--fs-lg);cursor:pointer;text-align:center;font-family:inherit;}
.chk-btn.sel-ok{background:#D1FAE5;border-color:var(--ok);}
.chk-btn.sel-warn{background:#FEF3C7;border-color:var(--warn);}
.chk-btn.sel-ng{background:#FEE2E2;border-color:var(--ng);}

/* ── ボタン ── */
.save-btn{width:100%;padding:18px;font-size:var(--fs-md);font-weight:600;border:none;border-radius:12px;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.save-btn:disabled{opacity:.5;}
.clear-btn{width:100%;padding:14px;font-size:var(--fs-sm);border:0.5px solid var(--border);border-radius:12px;background:var(--card);color:var(--sub);cursor:pointer;margin-top:10px;}

/* ── フィルター ── */
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;font-size:var(--fs-xs);padding:6px 14px;border:0.5px solid var(--border);border-radius:99px;background:var(--card);color:var(--sub);cursor:pointer;white-space:nowrap;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* ── 履歴 ── */
.hist-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.hist-top{font-size:var(--fs-sm);font-weight:600;color:var(--text);margin-bottom:2px;}
.hist-meta{font-size:var(--fs-xs);color:var(--muted);margin-bottom:8px;}
.hist-checks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.hchk{font-size:var(--fs-xs);padding:3px 9px;border-radius:99px;display:flex;align-items:center;gap:3px;}
.hchk-ok{background:#D1FAE5;color:#065F46;}
.hchk-warn{background:#FEF3C7;color:#92400E;}
.hchk-ng{background:#FEE2E2;color:#991B1B;}
.hist-text{font-size:var(--fs-sm);color:var(--text);line-height:1.7;margin-top:6px;}
.hist-lbl{font-size:var(--fs-xs);color:var(--muted);margin-bottom:2px;margin-top:8px;}

/* ── 状況 ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px;}
.kpi-val{font-size:28px;font-weight:600;color:var(--text);line-height:1;}
.kpi-lbl{font-size:var(--fs-xs);color:var(--muted);margin-top:5px;}
.kpi-sub{font-size:var(--fs-xs);color:var(--sub);}
.panel{background:var(--card);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.panel-head{padding:14px 16px;border-bottom:0.5px solid var(--border);font-size:var(--fs-sm);font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.panel-body{padding:14px 16px;}
.fielder-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F3F4F6;}
.fielder-row:last-child{border-bottom:none;}
.f-left{display:flex;align-items:center;gap:10px;}
.f-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.f-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);}
.f-sub{font-size:var(--fs-xs);color:var(--muted);margin-top:2px;}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{height:5px;border-radius:99px;background:#F3F4F6;width:60px;}
.prog-fill{height:100%;border-radius:99px;background:var(--accent);}
.nb{display:inline-block;font-size:var(--fs-xs);padding:3px 9px;border-radius:99px;}
.nb-blue{background:#DBEAFE;color:#1E40AF;}
.nb-green{background:#D1FAE5;color:#065F46;}
.nb-orange{background:#FEF3C7;color:#92400E;}
.stag-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;background:#FFF7ED;border:1px solid #FED7AA;margin-bottom:8px;}
.stag-item.danger{background:#FFF1F2;border-color:#FECDD3;}
.stag-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);}
.stag-sub{font-size:var(--fs-xs);color:var(--sub);margin-top:2px;}
.stag-days{font-size:var(--fs-lg);font-weight:700;color:var(--warn);}
.stag-item.danger .stag-days{color:var(--ng);}

/* ── 集計 ── */
.summary-sec{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;margin-bottom:8px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.bar-rect{width:100%;border-radius:4px 4px 0 0;background:var(--accent);min-height:4px;}
.bar-lbl{font-size:10px;color:var(--muted);white-space:nowrap;}
.bar-val{font-size:10px;color:var(--text);font-weight:600;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cs-card{background:var(--bg);border-radius:10px;padding:12px;}
.cs-title{font-size:var(--fs-xs);color:var(--sub);margin-bottom:8px;line-height:1.5;}
.cs-seg-wrap{display:flex;height:8px;border-radius:99px;overflow:hidden;gap:2px;margin-bottom:6px;}
.cs-seg{border-radius:99px;}
.cs-legend{display:flex;gap:8px;}
.cs-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;}
.cs-legend-item{font-size:11px;color:var(--sub);display:flex;align-items:center;}

/* ── 店舗詳細 ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--sub);cursor:pointer;border:none;background:transparent;margin-bottom:14px;padding:0;}
.dhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:10px;}
.dname{font-size:22px;font-weight:600;color:var(--text);}
.dmeta{font-size:var(--fs-xs);color:var(--muted);margin-top:4px;}
.info-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.ic-label{font-size:var(--fs-xs);font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid #F3F4F6;display:flex;align-items:center;gap:6px;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ii-lbl{font-size:var(--fs-xs);color:var(--muted);margin-bottom:4px;}
.ii-val{font-size:var(--fs-sm);font-weight:500;color:var(--text);}
/* タイムライン */
.tl-section-label{font-size:var(--fs-xs);font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.tl-item{display:flex;gap:12px;margin-bottom:14px;}
.tl-dc{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:11px;height:11px;border-radius:50%;margin-top:3px;flex-shrink:0;}
.tl-dot-visit{background:#2563EB;}
.tl-dot-senior{background:#004f8a;}
.tl-line{width:1px;background:var(--border);flex:1;margin-top:4px;}
.tl-body{flex:1;}
.tl-date{font-size:var(--fs-xs);color:var(--muted);margin-bottom:5px;}
.tl-card{background:var(--bg);border-radius:10px;padding:12px 14px;}
.tl-card.senior-card{background:#EFF6FF;border:0.5px solid #BFDBFE;}
.tl-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.tl-memo{font-size:var(--fs-sm);color:var(--text);margin-top:6px;line-height:1.7;}
.tl-next{font-size:var(--fs-xs);color:var(--sub);margin-top:5px;}
.tl-tag{display:inline-block;font-size:var(--fs-xs);padding:3px 10px;border-radius:99px;white-space:nowrap;}
.tag-visit{background:#DBEAFE;color:#1E40AF;}
.tag-senior{background:#EDE9FE;color:#5B21B6;}
.tag-ph{background:#F3F4F6;color:var(--sub);}
.tag-ok{background:#D1FAE5;color:#065F46;}
.tag-p{background:#FEF3C7;color:#92400E;}
.tag-ng{background:#FEE2E2;color:#991B1B;}
.badge{display:inline-block;font-size:var(--fs-xs);padding:3px 10px;border-radius:99px;white-space:nowrap;}
.rS{background:#FEF3C7;color:#92400E;}.rA{background:#D1FAE5;color:#065F46;}
.rB{background:#DBEAFE;color:#1E40AF;}.rC,.rD,.rE{background:#F3F4F6;color:var(--sub);}
.ph-bar{display:flex;gap:3px;align-items:center;}
.phb{width:24px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.phb.done{background:var(--accent);color:#fff;}.phb.cur{background:#F59E0B;color:#fff;}.phb.todo{background:#F3F4F6;color:var(--muted);}
/* 状況タブ 店舗カード */
.store-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:10px;}
.store-card:active{background:#EFF6FF;}
.sc-name{font-size:var(--fs-md);font-weight:600;color:var(--text);}
.sc-chain{font-size:var(--fs-xs);color:var(--muted);margin-top:2px;}
.sc-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:8px;}
.fielder-section{margin-bottom:16px;}
.fielder-section-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 12px;background:var(--card);border-radius:10px;border:0.5px solid var(--border);}

/* ── toast ── */
.toast-area{position:fixed;top:65px;left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:100;}
.toast{font-size:var(--fs-sm);font-weight:500;padding:11px 22px;border-radius:99px;opacity:0;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.toast.ok{background:#D1FAE5;color:#065F46;}.toast.err{background:#FEE2E2;color:#991B1B;}
.toast.show{opacity:1;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:3rem 1rem;font-size:var(--fs-sm);color:var(--muted);}
</style>
</head>
<body>
<div id="toast-area" class="toast-area"></div>

<div class="screen active" id="scr-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title"><i class="ti ti-users"></i> 同行記録</div>
      <div class="login-sub">同行者を選択してください。</div>
      <div class="senior-grid" id="senior-grid">
        <div style="text-align:center;padding:20px;color:var(--muted);">読み込み中...</div>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);">
        <button onclick="openDashboard()" style="width:100%;padding:14px;border:0.5px solid var(--accent);border-radius:12px;background:var(--accent-light);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:var(--fs-md);font-weight:600;font-family:inherit;">
          <i class="ti ti-chart-bar"></i> 同行活動ダッシュボード
        </button>
      </div>
    </div>
  </div>
</div>


<div class="screen" id="scr-dashboard">
  <div class="topbar">
    <div class="t-logo"><i class="ti ti-chart-bar"></i> 同行活動ダッシュボード</div>
    <div class="t-right">
      <button class="t-switch" onclick="closeDashboard()"><i class="ti ti-arrow-left" style="font-size:14px;vertical-align:-2px;"></i> 戻る</button>
    </div>
  </div>
  <div class="page">
    <div class="filter-scroll" id="db-senior-filter"></div>
    <div id="db-content"><div class="empty">読み込み中...</div></div>
    <div style="height:24px;"></div>
  </div>
</div>

<div class="screen" id="scr-main">
  <div class="topbar">
    <div class="t-logo"><i class="ti ti-users"></i><span id="t-name"></span></div>
    <div class="t-right">
      <div style="display:flex;align-items:center;gap:5px;">
        <div class="sdot" id="sdot"></div>
        <span class="stext" id="stext"></span>
      </div>
      <button class="t-switch" onclick="logout()">切替</button>
    </div>
  </div>
  <!-- 同行入力 -->
  <div class="view active" id="view-input">
    <div class="page">
      <div class="rec-sec">
        <div class="sec-hd"><i class="ti ti-info-circle"></i> 基本情報</div>
        <div class="r2" style="margin-bottom:14px;">
          <div class="field"><label>同行日</label><input type="date" id="s-date"></div>
          <div class="field"><label>同行者</label><input type="text" id="s-senior" readonly></div>
        </div>
        <div class="field" style="margin-bottom:14px;">
          <label>対象フィールダー</label>
          <select id="s-fielder" onchange="onFielderChange()"><option value="">選択してください</option></select>
        </div>
        <div class="field">
          <label>訪問店舗</label>
          <select id="s-store"><option value="">フィールダーを選択してください</option></select>
        </div>
      </div>
      <div class="rec-sec">
        <div class="sec-hd"><i class="ti ti-checklist"></i> チェック項目</div>
        <div id="check-items"></div>
      </div>
      <div class="rec-sec">
        <div class="sec-hd"><i class="ti ti-message"></i> コメント</div>
        <div class="field"><label>観察内容</label><textarea id="s-observation" placeholder="同行時に気づいた点、良かった点など"></textarea></div>
        <div class="field"><label>フィードバック</label><textarea id="s-feedback" placeholder="フィールダーへのフィードバック"></textarea></div>
        <div class="field"><label>次回への指示・アクション</label><textarea id="s-next" placeholder="例：次回は提案資料を事前に準備する" style="min-height:70px;"></textarea></div>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveRecord()"><i class="ti ti-device-floppy"></i> 保存・送信</button>
      <button class="clear-btn" onclick="clearForm()">クリア</button>
      <div style="height:24px;"></div>
    </div>
  </div>

  <!-- 店舗詳細 -->
  <div class="view" id="view-store-detail">
    <div class="page">
      <button class="back-btn" id="store-back-btn" onclick="storeDetailBack()"><i class="ti ti-arrow-left"></i> <span id="store-back-label">状況に戻る</span></button>
      <div class="dhead">
        <div><div class="dname" id="sd-name"></div><div class="dmeta" id="sd-meta"></div></div>
      </div>
      <div class="info-card" id="sd-master"></div>
      <div style="font-size:var(--fs-xs);font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <i class="ti ti-history"></i> 活動タイムライン
        <span id="sd-tl-filter-label" style="font-weight:400;color:var(--sub);letter-spacing:0;text-transform:none;font-size:var(--fs-xs);"></span>
      </div>
      <div id="sd-timeline"></div>
      <div style="height:24px;"></div>
    </div>
  </div>

</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbxpnXDwE36Wsk5-RNDvwgWJFdmi8MUEgj0Acbx-nZGENv-tSnUKpgEp14CaoFyJKJPq/exec';
const CK='sr_c';
const CHECK_ITEMS=[
  {id:'check1',label:'事前準備ができていたか'},
  {id:'check2',label:'課題をヒアリングできていたか'},
  {id:'check3',label:'提案内容が適切だったか'},
  {id:'check4',label:'クロージング（次回アクション設定）ができていたか'},
  {id:'check5',label:'売上の減少・向上の要因を把握し店舗担当者と共有できているか'},
];
const CHECK_VALS=['〇','△','✕'];
const CHECK_CLS=['sel-ok','sel-warn','sel-ng'];
const AVATAR_COLORS=[
  {color:'#DBEAFE',tc:'#1E40AF'},{color:'#D1FAE5',tc:'#065F46'},
  {color:'#FEF3C7',tc:'#92400E'},{color:'#EDE9FE',tc:'#5B21B6'},
  {color:'#FCE7F3',tc:'#9D174D'},{color:'#E0F2FE',tc:'#0C4A6E'},
];
const MONTH_LABELS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let cu=null,stores=[],members=[],checks={};
let seniorRecords=[],histFilter='全員',dbAllRecords=[];

function initials(n){return n.replace(/\s/g,'').slice(0,2);}
function fmtDate(v){
  if(!v)return '';
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(v)))return String(v);
  const d=new Date(v);
  if(isNaN(d.getTime()))return String(v);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getYearMonth(dateStr){
  const d=fmtDate(dateStr);
  return d?d.slice(0,7):'';
}
function setSyncDot(state,msg){
  const d=document.getElementById('sdot');const t=document.getElementById('stext');
  if(d)d.className='sdot '+state;if(t)t.textContent=msg;
}
function toast(msg,type){
  const area=document.getElementById('toast-area');
  const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;area.appendChild(el);
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},3000);
}

async function loadSeniors(){
  try{
    const res=await fetch(GAS+'?action=getSeniors');
    const json=await res.json();
    const seniors=json.seniors||[];
    document.getElementById('senior-grid').innerHTML=seniors.length
      ?seniors.map((name,i)=>{
        const col=AVATAR_COLORS[i%AVATAR_COLORS.length];
        return`<button class="s-btn" onclick="login('${name}')">
          <div class="s-avatar" style="background:${col.color};color:${col.tc};">${initials(name)}</div>
          ${name}
        </button>`;
      }).join('')
      :'<div style="color:var(--ng);font-size:var(--fs-sm);text-align:center;">同行者データが見つかりません</div>';
  }catch(e){
    document.getElementById('senior-grid').innerHTML='<div style="color:var(--ng);font-size:var(--fs-sm);text-align:center;">読み込みエラー</div>';
  }
}

function login(name){
  cu=name;
  try{localStorage.setItem(CK,name);}catch(e){}
  document.getElementById('scr-login').classList.remove('active');
  document.getElementById('scr-main').classList.add('active');
  document.getElementById('t-name').textContent=name;
  goView('input');
  loadData();
}
function logout(){
  try{localStorage.removeItem(CK);}catch(e){}
  cu=null;seniorRecords=[];
  document.getElementById('scr-main').classList.remove('active');
  document.getElementById('scr-login').classList.add('active');
}

async function loadData(){
  setSyncDot('spin','読み込み中...');
  try{
    const [allRes,seniorRes]=await Promise.all([
      fetch(GAS+'?action=getAll').then(r=>r.json()),
      fetch(GAS+'?action=getSeniorRecords&senior=').then(r=>r.json()),
    ]);
    stores=allRes.stores||[];
    members=allRes.members||[];
    seniorRecords=(seniorRes.records||[]).map(r=>({...r,date:fmtDate(r.date)}));
    const sel=document.getElementById('s-fielder');
    sel.innerHTML='<option value="">選択してください</option>'+
      members.map(m=>`<option value="${m}">${m}</option>`).join('');
    setSyncDot('ok','読込完了');
  }catch(e){setSyncDot('err','読込エラー');}
}

// store-detailの戻り先（'status' or 'dashboard'）
let storeDetailFrom='status';

function storeDetailBack(){
  if(storeDetailFrom==='dashboard'){
    // scr-mainを隠してscr-dashboardを表示
    document.getElementById('scr-main').classList.remove('active');
    document.getElementById('scr-dashboard').classList.add('active');

// ダッシュボードから店舗詳細を開く
function openStoreDetailFromDashboard(sname){
  // データがまだ状況タブにロードされていない場合はstatusStoresを使う
  // statusStores・statusInvoMap・statusVisitRecords・statusSeniorRecsはrenderStatus時に格納済み
  // なければloadDataの内容（stores）で代用
  if(!statusStores||statusStores.length===0){
    statusStores=stores;
  }
  storeDetailFrom='dashboard';
  document.getElementById('store-back-label').textContent='ダッシュボードに戻る';
  // scr-dashboardを隠してscr-mainのstore-detailへ
  document.getElementById('scr-dashboard').classList.remove('active');
  document.getElementById('scr-main').classList.add('active');
  openStoreDetail(sname);
}

function goView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  const target=document.getElementById('view-'+v);
  if(target)target.classList.add('active');
  window.scrollTo(0,0);
  if(v==='input')initForm();
}


// ── 同行活動ダッシュボード ──
let dbSeniorFilter='全員';

function openDashboard(){
  document.getElementById('scr-login').classList.remove('active');
  document.getElementById('scr-dashboard').classList.add('active');
  loadDashboard();
}
function closeDashboard(){
  document.getElementById('scr-dashboard').classList.remove('active');
  document.getElementById('scr-login').classList.add('active');
}

async function loadDashboard(){
  document.getElementById('db-content').innerHTML='<div class="empty">読み込み中...</div>';
  try{
    // storesが未取得の場合はgetAllで取得してからダッシュボードを描画
    const needStores=!stores||stores.length===0;
    const fetches=[
      fetch(GAS+'?action=getSeniorRecords&senior=').then(r=>r.json()),
      fetch(GAS+'?action=getSeniors').then(r=>r.json()),
    ];
    if(needStores) fetches.push(fetch(GAS+'?action=getAll').then(r=>r.json()));
    const results=await Promise.all(fetches);
    const [seniorRes,seniorsRes,allRes]=results;
    if(needStores&&allRes){
      stores=allRes.stores||[];
      members=allRes.members||[];
    }
    // statusStoresを常に最新storesで更新
    statusStores=stores;
    const allRecords=(seniorRes.records||[]).map(r=>({...r,date:fmtDate(r.date)}));
    const seniors=['全員',...(seniorsRes.seniors||[])];
    statusSeniorRecs=allRecords;
    dbAllRecords=allRecords;
    document.getElementById('db-senior-filter').innerHTML=seniors.map(s=>
      `<button class="filter-chip${dbSeniorFilter===s?' active':''}" onclick="setDbFilter('${s}')">${s}</button>`
    ).join('');
    renderDashboard(allRecords);
  }catch(e){
    document.getElementById('db-content').innerHTML='<div class="empty">読み込みエラー</div>';
  }
}

function setDbFilter(name){
  dbSeniorFilter=name;
  document.querySelectorAll('#db-senior-filter .filter-chip').forEach(btn=>{
    btn.classList.toggle('active', btn.textContent.trim()===name);
  });
  renderDashboard(dbAllRecords);
}

let dbMonthFilter='全期間';
let dbAllRecordsCache=[];

function renderDashboard(allRecords){
  dbAllRecordsCache=allRecords;
  _renderDashboardInner();
}

function toggleCovDetail(idx){
  const panel=document.getElementById('cov-detail-'+idx);
  const arrow=document.getElementById('cov-arrow-'+idx);
  const row=panel?panel.previousElementSibling:null;
  if(!panel)return;
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  if(arrow)arrow.className='ti '+(isOpen?'ti-chevron-down':'ti-chevron-up');
  if(row)row.style.background=isOpen?'var(--card)':'#EFF6FF';
}

function setDbMonthFilter(m){
  dbMonthFilter=m;
  document.querySelectorAll('.db-month-chip').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  _renderDashboardInner();
}

function _renderDashboardInner(){
  // statusStoresはrenderStatus()でセットされるが、状況タブ廃止後はstoresで補完
  if(!statusStores||statusStores.length===0) statusStores=stores;
  // 同行者フィルター
  let records=dbSeniorFilter==='全員'?dbAllRecordsCache:dbAllRecordsCache.filter(r=>r.senior===dbSeniorFilter);
  // 月フィルター
  if(dbMonthFilter!=='全期間') records=records.filter(r=>getYearMonth(r.date)===dbMonthFilter);

  // ── 集計（全て「日付×同行者」ユニークで日数カウント） ──
  // 同行日数：日付×同行者のユニーク数
  const totalDays=new Set(records.map(r=>r.date+'__'+r.senior)).size;
  // 同行店舗数：件数そのまま
  const total=records.length;

  // 月別：日付×同行者のユニーク数を月ごとに集計
  const monthDaySet={};
  records.forEach(r=>{
    const m=getYearMonth(r.date);if(!m)return;
    if(!monthDaySet[m])monthDaySet[m]=new Set();
    monthDaySet[m].add(r.date+'__'+r.senior);
  });
  const monthEntries=Object.entries(monthDaySet)
    .map(([m,s])=>[m,s.size])
    .sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const maxM=Math.max(...monthEntries.map(([,v])=>v),1);

  // 月フィルター用チップ（直近6ヶ月）
  const allMonths=Object.keys(monthDaySet).sort().slice(-6);

  // フィールダー別：日付×同行者のユニーク日数
  const fielderDaySet={};
  records.forEach(r=>{
    if(!r.fielder)return;
    if(!fielderDaySet[r.fielder])fielderDaySet[r.fielder]=new Set();
    fielderDaySet[r.fielder].add(r.date+'__'+r.senior);
  });
  const fielderEntries=Object.entries(fielderDaySet)
    .map(([name,s])=>[name,s.size])
    .sort((a,b)=>b[1]-a[1]);
  const maxF=Math.max(...fielderEntries.map(([,v])=>v),1);

  // 同行者別日数
  const seniorDaySet={};
  records.forEach(r=>{
    if(!r.senior)return;
    if(!seniorDaySet[r.senior])seniorDaySet[r.senior]=new Set();
    seniorDaySet[r.senior].add(r.date);
  });
  const seniorEntries=Object.entries(seniorDaySet)
    .map(([name,s])=>[name,s.size])
    .sort((a,b)=>b[1]-a[1]);

  // カバレッジ進捗バー（全フィールダーの担当店舗に対する同行済み率）
  const seniorStoresByFielder={};
  records.forEach(r=>{
    if(!r.fielder||!r.storeName)return;
    if(!seniorStoresByFielder[r.fielder])seniorStoresByFielder[r.fielder]=new Set();
    seniorStoresByFielder[r.fielder].add(r.storeName);
  });
  // storesからフィールダー別担当店舗数を取得
  const totalStoresByFielder={};
  (statusStores||[]).forEach(s=>{
    if(!s.pic)return;
    totalStoresByFielder[s.pic]=(totalStoresByFielder[s.pic]||0)+1;
  });
  const coverageEntries=fielderEntries.map(([name])=>{
    const done=(seniorStoresByFielder[name]||new Set()).size;
    const ttl=totalStoresByFielder[name]||0;
    const pct=ttl>0?Math.round(done/ttl*100):0;
    return{name,done,ttl,pct};
  }).filter(e=>e.ttl>0);

  // 同行明細（日付降順、最新20件）
  const sortedRecs=[...records].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,20);

  const barStyle=(color,h)=>`width:100%;max-width:80px;border-radius:4px 4px 0 0;background:${color};height:${h}px;`;
  const colStyle=`display:flex;flex-direction:column;align-items:center;gap:4px;width:80px;flex-shrink:0;`;
  const chartWrap=`display:flex;align-items:flex-end;gap:12px;height:110px;margin-bottom:8px;overflow-x:auto;overflow-y:visible;padding-top:24px;padding-bottom:4px;box-sizing:content-box;`;

  const coverColor=pct=>pct>=67?'#059669':pct>=34?'#F59E0B':'#EF4444';

  document.getElementById('db-content').innerHTML=`
    <div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;">
      <button class="filter-chip db-month-chip${dbMonthFilter==='全期間'?' active':''}" data-m="全期間" onclick="setDbMonthFilter('全期間')">全期間</button>
      ${allMonths.map(m=>`<button class="filter-chip db-month-chip${dbMonthFilter===m?' active':''}" data-m="${m}" onclick="setDbMonthFilter('${m}')">${m.slice(5)}月</button>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="kpi-card"><div class="kpi-val">${totalDays}</div><div class="kpi-lbl">同行日数</div></div>
      <div class="kpi-card"><div class="kpi-val">${total}</div><div class="kpi-lbl">同行店舗数</div></div>
      <div class="kpi-card"><div class="kpi-val">${fielderEntries.length}</div><div class="kpi-lbl">フィールダー数</div></div>
    </div>
    ${dbSeniorFilter==='全員'&&seniorEntries.length>1?`
    <div class="rec-sec">
      <div class="sec-hd"><i class="ti ti-users"></i> 同行者別 同行日数</div>
      <div style="${chartWrap}">
        ${seniorEntries.map(([name,v])=>`
          <div style="${colStyle}">
            <div style="font-size:11px;font-weight:600;color:var(--text);">${v}</div>
            <div style="${barStyle('var(--accent)',Math.round(v/Math.max(...seniorEntries.map(([,x])=>x),1)*80))}"></div>
            <div style="font-size:10px;color:var(--muted);white-space:nowrap;">${initials(name)}</div>
          </div>`).join('')}
      </div>
    </div>`:''}
    ${dbMonthFilter==='全期間'?`<div class="rec-sec">
      <div class="sec-hd"><i class="ti ti-calendar-stats"></i> 月別 同行日数（直近6ヶ月）</div>
      <div style="font-size:var(--fs-xs);color:var(--muted);margin-bottom:8px;">同じ日に複数店舗でも1日</div>
      ${monthEntries.length?`<div style="${chartWrap}">
        ${monthEntries.map(([m,v])=>`
          <div style="${colStyle}">
            <div style="font-size:11px;font-weight:600;color:var(--text);">${v}</div>
            <div style="${barStyle('var(--accent)',Math.round(v/maxM*80))}"></div>
            <div style="font-size:10px;color:var(--muted);">${m.slice(5)}月</div>
          </div>`).join('')}
      </div>`:'<div style="color:var(--muted);font-size:var(--fs-sm);padding:8px 0;">データがありません</div>'}
    </div>`:''}
    <div class="rec-sec">
      <div class="sec-hd"><i class="ti ti-users"></i> フィールダー別 同行日数</div>
      ${fielderEntries.length?`<div style="${chartWrap}">
        ${fielderEntries.map(([name,v])=>`
          <div style="${colStyle}">
            <div style="font-size:11px;font-weight:600;color:var(--text);">${v}</div>
            <div style="${barStyle('#059669',Math.round(v/maxF*80))}"></div>
            <div style="font-size:10px;color:var(--muted);white-space:nowrap;">${initials(name)}</div>
          </div>`).join('')}
      </div>`:'<div style="color:var(--muted);font-size:var(--fs-sm);padding:8px 0;">データがありません</div>'}
    </div>
    ${coverageEntries.length?`
    <div class="rec-sec" id="cov-panel">
      <div class="sec-hd"><i class="ti ti-map-pin"></i> 担当店舗 同行カバレッジ</div>
      <div style="font-size:var(--fs-xs);color:var(--muted);margin-bottom:10px;">担当者名をタップすると同行済み店舗の明細が展開されます</div>
      ${coverageEntries.map((e,ei)=>{
        // その担当者の同行済み店舗レコードを取得（月フィルター適用済みrecordsから）
        const covRecs=records.filter(r=>r.fielder===e.name);
        const chkLabels=['事前','ヒアリング','提案','クロージング','売上要因'];
        const detailHtml=covRecs.length?covRecs
          .sort((a,b)=>String(b.date).localeCompare(String(a.date)))
          .map(r=>{
            const chkVals=[r.check1,r.check2,r.check3,r.check4,r.check5];
            const chkHtml=chkLabels.map((l,i)=>chkVals[i]?`<span class="hchk ${chkVals[i]==='〇'?'hchk-ok':chkVals[i]==='△'?'hchk-warn':'hchk-ng'}">${chkVals[i]} ${l}</span>`:'').filter(Boolean).join('');
            return`<div style="padding:8px 0;border-bottom:0.5px solid #DBEAFE;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
                <span style="font-size:var(--fs-sm);font-weight:600;color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;" onclick="openStoreDetailFromDashboard('${(r.storeName||'').replace(/'/g,"\\'")}')">${r.storeName||'—'}<i class="ti ti-chevron-right" style="font-size:12px;vertical-align:-1px;margin-left:2px;"></i></span>
                <div style="display:flex;align-items:center;gap:6px;">
                  <span style="font-size:var(--fs-xs);color:var(--muted);white-space:nowrap;">${r.date}</span>
                  <button onclick="openEditModal('${r.id}')" style="display:inline-flex;align-items:center;gap:3px;font-size:var(--fs-xs);padding:3px 8px;border-radius:99px;border:0.5px solid #BFDBFE;background:#EFF6FF;color:#1E40AF;cursor:pointer;white-space:nowrap;"><i class="ti ti-edit" style="font-size:12px;"></i>編集</button>
                </div>
              </div>
              <div style="font-size:var(--fs-xs);color:var(--muted);margin-bottom:4px;">同行：${r.senior||''}</div>
              ${chkHtml?`<div style="display:flex;gap:4px;flex-wrap:wrap;">${chkHtml}</div>`:''}
              ${r.feedback?`<div style="font-size:var(--fs-xs);color:var(--sub);margin-top:4px;"><i class="ti ti-message-circle" style="font-size:12px;"></i> ${r.feedback}</div>`:''}
            </div>`;
          }).join('')
          :'<div style="font-size:var(--fs-xs);color:var(--muted);padding:8px 0;">同行記録なし</div>';
        return`
        <div style="border-radius:8px;border:0.5px solid var(--border);overflow:hidden;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:var(--card);" onclick="toggleCovDetail(${ei})">
            <div style="font-size:var(--fs-xs);font-weight:600;color:var(--text);width:52px;flex-shrink:0;">${e.name.split(' ')[0]}</div>
            <div style="flex:1;height:10px;background:var(--border);border-radius:99px;overflow:hidden;">
              <div style="height:10px;border-radius:99px;background:${coverColor(e.pct)};width:${e.pct}%;"></div>
            </div>
            <div style="font-size:var(--fs-xs);color:var(--muted);width:58px;text-align:right;flex-shrink:0;">${e.done}/${e.ttl}店 ${e.pct}%</div>
            <i class="ti ti-chevron-down" id="cov-arrow-${ei}" style="font-size:16px;color:var(--muted);flex-shrink:0;"></i>
          </div>
          <div id="cov-detail-${ei}" style="display:none;padding:0 12px 4px;background:#F0F7FF;border-top:0.5px solid #DBEAFE;">
            ${detailHtml}
          </div>
        </div>`;
      }).join('')}
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);color:var(--muted);"><div style="width:9px;height:9px;border-radius:50%;background:#059669;"></div>67%以上</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);color:var(--muted);"><div style="width:9px;height:9px;border-radius:50%;background:#F59E0B;"></div>34〜66%</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:var(--fs-xs);color:var(--muted);"><div style="width:9px;height:9px;border-radius:50%;background:#EF4444;"></div>33%以下</div>
      </div>
    </div>`:''}
    <div class="rec-sec">
      <div class="sec-hd"><i class="ti ti-list"></i> 同行明細${dbMonthFilter!=='全期間'?`（${dbMonthFilter.slice(5)}月）`:''}（直近20件）</div>
      ${sortedRecs.length?sortedRecs.map(r=>{
        const chkLabels=['事前','ヒアリング','提案','クロージング','売上要因'];
        const chkVals=[r.check1,r.check2,r.check3,r.check4,r.check5];
        const chkHtml=chkLabels.map((l,i)=>chkVals[i]?`<span class="hchk ${chkVals[i]==='〇'?'hchk-ok':chkVals[i]==='△'?'hchk-warn':'hchk-ng'}">${chkVals[i]} ${l}</span>`:'').filter(Boolean).join('');
        return`<div style="padding:10px 0;border-bottom:0.5px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <div style="font-size:var(--fs-sm);font-weight:600;color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:2px;" onclick="openStoreDetailFromDashboard('${(r.storeName||'').replace(/'/g,"\\'")}')">${r.storeName||'—'}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="font-size:var(--fs-xs);color:var(--muted);white-space:nowrap;">${r.date}</div>
              <button onclick="openEditModal('${r.id}')" style="display:inline-flex;align-items:center;gap:3px;font-size:var(--fs-xs);padding:3px 8px;border-radius:99px;border:0.5px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;white-space:nowrap;"><i class="ti ti-edit" style="font-size:12px;"></i>編集</button>
            </div>
          </div>
          <div style="font-size:var(--fs-xs);color:var(--muted);margin-bottom:5px;">${r.fielder||''} ／ 同行：${r.senior||''}</div>
          ${chkHtml?`<div style="display:flex;gap:4px;flex-wrap:wrap;">${chkHtml}</div>`:''}
          ${r.feedback?`<div style="font-size:var(--fs-xs);color:var(--sub);margin-top:5px;"><i class="ti ti-message-circle" style="font-size:12px;"></i> ${r.feedback}</div>`:''}
        </div>`;
      }).join(''):'<div style="color:var(--muted);font-size:var(--fs-sm);padding:8px 0;">データがありません</div>'}
    </div>`;

async function saveEditRecord(){
  const id=document.getElementById('edit-rec-id').value;
  const allRecs=[...seniorRecords,...(statusSeniorRecs||[])];
  const rec=allRecs.find(r=>String(r.id)===String(id));
  if(!rec){toast('記録が見つかりません','err');return;}

  // チェック値を取得
  const getChk=(checkId)=>{
    const container=document.getElementById('edit-chk-'+checkId);
    if(!container)return rec['check'+checkId.replace('check','')] ||'';
    const active=container.querySelector('.chk-btn.chk-ok,.chk-btn.chk-warn,.chk-btn.chk-ng');
    return active?active.textContent.trim():'';
  };
  const updated={
    ...rec,
    check1:getChk('check1'),check2:getChk('check2'),check3:getChk('check3'),
    check4:getChk('check4'),check5:getChk('check5'),
    observation:document.getElementById('edit-observation').value.trim(),
    feedback:document.getElementById('edit-feedback').value.trim(),
    nextAction:document.getElementById('edit-next').value.trim(),
  };

  const btn=document.getElementById('edit-save-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 送信中...';
  try{
    await postGAS({action:'updateSeniorRecord',...updated});
    // ローカルも更新
    const idx=seniorRecords.findIndex(r=>String(r.id)===String(id));
    if(idx>=0)seniorRecords[idx]={...updated};
    const idx2=(statusSeniorRecs||[]).findIndex(r=>String(r.id)===String(id));
    if(idx2>=0)statusSeniorRecs[idx2]={...updated};
    toast('更新しました','ok');
    closeEditModal();
    // ダッシュボード表示中なら再描画
    if(document.getElementById('scr-dashboard').classList.contains('active')){
      _renderDashboardInner();
    }
  }catch(e){
    toast('送信エラー','err');
    btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> 保存';
  }
}

const GOALS_S=['平台獲得','売場改善','多面展開','取り扱いアイテム増'];
const RANK_CLS={S:'rS',A:'rA',B:'rB',C:'rC',D:'rD',E:'rE'};

function renderStatusStoreList(seniorStoreSet){
  const container=document.getElementById('status-store-list');
  if(!container)return;
  let list=statusFielderFilter==='全員'?statusStores:statusStores.filter(s=>s.pic===statusFielderFilter);
  list=list.slice().sort((a,b)=>{
    const da=statusInvoMap[a.name]?.lastVisit||'';
    const db=statusInvoMap[b.name]?.lastVisit||'';
    if(!da&&!db)return 0;if(!da)return -1;if(!db)return 1;
    return da.localeCompare(db);
  });
  if(!list.length){container.innerHTML='<div class="empty">店舗がありません</div>';return;}
  const ss=seniorStoreSet||new Set(statusSeniorRecs.map(r=>r.storeName));
  // 店舗ごとの同行回数・最終同行日を集計
  const seniorCountByStore={};
  const seniorLastByStore={};
  statusSeniorRecs.forEach(r=>{
    if(!r.storeName)return;
    seniorCountByStore[r.storeName]=(seniorCountByStore[r.storeName]||0)+1;
    if(!seniorLastByStore[r.storeName]||r.date>seniorLastByStore[r.storeName])
      seniorLastByStore[r.storeName]=r.date;
  });
  container.innerHTML=list.map(s=>{
    const info=statusInvoMap[s.name]||{};
    const rk=s.rank?`<span class="badge ${RANK_CLS[s.rank]||'rC'}">${s.rank}</span>`:'';
    const goalIdx=info.goal!=null?GOALS_S.indexOf(info.goal):-1;
    const gl=goalIdx>=0?`<span class="tl-tag tag-visit">${GOALS_S[goalIdx]}</span>`:'';
    const ph=info.phase>0?`<span class="tl-tag tag-ph">Ph.${info.phase}</span>`:'';
    const days=info.lastVisit?Math.floor((Date.now()-new Date(info.lastVisit).getTime())/(1000*60*60*24)):null;
    const daysColor=days===null?'var(--muted)':days>=60?'var(--ng)':days>=30?'var(--warn)':'var(--muted)';
    // 同行バッジ
    const scnt=seniorCountByStore[s.name]||0;
    const slast=seniorLastByStore[s.name]||'';
    const seniorBadge=scnt>0
      ?`<span class="tl-tag tag-senior"><i class="ti ti-users" style="font-size:11px;"></i> 同行${scnt}回${slast?' 最終'+slast:''}</span>`
      :`<span class="tl-tag" style="background:#F3F4F6;color:var(--muted);"><i class="ti ti-users" style="font-size:11px;"></i> 未同行</span>`;
    return`<div class="store-card" onclick="openStoreDetail('${s.name.replace(/'/g,"\\'")}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div class="sc-name">${s.name}</div>
          <div class="sc-chain">${s.chain||''}${s.pic&&statusFielderFilter==='全員'?' ／ '+s.pic:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">${rk}<i class="ti ti-chevron-right" style="color:var(--muted);font-size:18px;"></i></div>
      </div>
      <div class="sc-bottom">
        <div style="display:flex;gap:5px;flex-wrap:wrap;">${gl}${ph}${seniorBadge}</div>
        <div style="font-size:var(--fs-xs);color:${daysColor};">${days!==null?days+'日前':info.lastVisit||'未訪問'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── 店舗詳細 ──
function openStoreDetail(sname){
  // 状況タブから呼ばれた場合はfromをstatusにリセット
  if(storeDetailFrom!=='dashboard'){
    storeDetailFrom='status';
    document.getElementById('store-back-label').textContent='状況に戻る';
  }
  const s=statusStores.find(x=>x.name===sname);
  const info=statusInvoMap[sname]||{};
  if(!s)return;

  document.getElementById('sd-name').textContent=s.name;
  document.getElementById('sd-meta').textContent=[
    s.chain, s.rank?'ランク '+s.rank:'', s.pic?'担当：'+s.pic:''
  ].filter(Boolean).join(' ／ ');

  const fmtNum=v=>v?Number(String(v).replace(/,/g,'')).toLocaleString('ja-JP')||v:null;
  const goalIdx=info.goal!=null?GOALS_S.indexOf(info.goal):-1;
  const phBar=info.phase>0?
    `<div style="display:flex;gap:3px;margin-top:10px;">${[1,2,3,4,5].map(n=>`<div class="phb ${n<info.phase?'done':n===info.phase?'cur':'todo'}">${n}</div>`).join('')}</div>`:'';
  document.getElementById('sd-master').innerHTML=`
    <div class="ic-label"><i class="ti ti-building"></i> 店舗情報</div>
    <div class="ig">
      <div><div class="ii-lbl">チェーン名</div><div class="ii-val">${s.chain||'—'}</div></div>
      <div><div class="ii-lbl">弊社担当者</div><div class="ii-val">${s.pic||'—'}</div></div>
      <div><div class="ii-lbl">売上ランク</div><div class="ii-val">${s.rank?`<span class="badge ${RANK_CLS[s.rank]||'rC'}">${s.rank}</span>`:'—'}</div></div>
      <div><div class="ii-lbl">前年金額</div><div class="ii-val">${fmtNum(s.prevResult)||'—'}</div></div>
      <div><div class="ii-lbl">現在のゴール</div><div class="ii-val">${goalIdx>=0?GOALS_S[goalIdx]:'未設定'}</div></div>
      <div><div class="ii-lbl">最終訪問日</div><div class="ii-val">${info.lastVisit||'—'}</div></div>
    </div>${phBar}`;

  // 訪問記録＋同行記録を日付降順でマージ
  const visitRecs=statusVisitRecords.filter(r=>r.storeName===sname).map(r=>({...r,_type:'visit'}));
  const seniorRecs=statusSeniorRecs.filter(r=>r.storeName===sname).map(r=>({...r,_type:'senior'}));
  const merged=[...visitRecs,...seniorRecs].sort((a,b)=>String(b.date).localeCompare(String(a.date)));

  const filterLabel=statusFielderFilter!=='全員'?`（${statusFielderFilter} のみ）`:'';
  document.getElementById('sd-tl-filter-label').textContent=filterLabel;

  const chkLabels=['事前準備','ヒアリング','提案','クロージング','売上要因'];
  const chkCls=v=>v==='〇'?'hchk-ok':v==='△'?'hchk-warn':'hchk-ng';
  const rcls={'合意・達成':'tag-ok','検討中':'tag-p','見送り':'tag-ng','s':'tag-ok','p':'tag-p','f':'tag-ng'};
  const rlbl={'合意・達成':'合意・達成','検討中':'検討中','見送り':'見送り','s':'合意・達成','p':'検討中','f':'見送り'};

  document.getElementById('sd-timeline').innerHTML=merged.length?merged.map((r,i)=>{
    const isLast=i===merged.length-1;
    if(r._type==='visit'){
      return`<div class="tl-item">
        <div class="tl-dc"><div class="tl-dot tl-dot-visit"></div>${!isLast?'<div class="tl-line"></div>':''}</div>
        <div class="tl-body">
          <div class="tl-date">${r.date}${r.fielder?' ／ '+r.fielder:''}</div>
          <div class="tl-card">
            <div class="tl-row">
              <span class="tl-tag tag-visit"><i class="ti ti-clipboard" style="font-size:11px;"></i> 訪問</span>
              ${r.phase?`<span class="tl-tag tag-ph">Ph.${r.phase}</span>`:''}
              ${r.result?`<span class="tl-tag ${rcls[r.result]||'tag-ph'}">${rlbl[r.result]||r.result}</span>`:''}
            </div>
            ${r.memo?`<div class="tl-memo">${r.memo}</div>`:''}
            ${r.next?`<div class="tl-next"><i class="ti ti-arrow-right"></i> ${r.next}</div>`:''}
            ${r.nextDate?`<div style="font-size:var(--fs-xs);color:var(--muted);margin-top:3px;">次回：${r.nextDate}</div>`:''}
          </div>
        </div>
      </div>`;
    }else{
      const chkVals=[r.check1,r.check2,r.check3,r.check4,r.check5];
      return`<div class="tl-item">
        <div class="tl-dc"><div class="tl-dot tl-dot-senior"></div>${!isLast?'<div class="tl-line"></div>':''}</div>
        <div class="tl-body">
          <div class="tl-date">${r.date}${r.fielder?' ／ '+r.fielder:''}</div>
          <div class="tl-card senior-card">
            <div class="tl-row">
              <span class="tl-tag tag-senior"><i class="ti ti-users" style="font-size:11px;"></i> 同行：${r.senior||''}</span>
            </div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;">
              ${chkLabels.map((l,ci)=>chkVals[ci]?`<span class="hchk ${chkCls(chkVals[ci])}">${chkVals[ci]} ${l}</span>`:'').join('')}
            </div>
            ${r.observation?`<div class="hist-lbl">観察内容</div><div class="tl-memo">${r.observation}</div>`:''}
            ${r.feedback?`<div class="hist-lbl">フィードバック</div><div class="tl-memo">${r.feedback}</div>`:''}
            ${r.nextAction?`<div class="hist-lbl">次回指示</div><div class="tl-memo">${r.nextAction}</div>`:''}
          </div>
        </div>
      </div>`;
    }
  }).join(''):'<div class="empty">活動記録がありません</div>';

  goView('store-detail');
}



async function postGAS(data){
  const res=await fetch(GAS,{method:'POST',body:JSON.stringify(data)});
  if(!res.ok)throw new Error('HTTP '+res.status);
  return res.json();
}

if(cu){

  document.getElementById('scr-main').classList.add('active');
  document.getElementById('t-name').textContent=cu;
  goView('input');
  loadData();
}else{
  loadSeniors();
}
