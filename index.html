<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アプリが移転しました｜フィールドチーム管理</title>
<!-- 5秒後に新アプリへ自動移動 -->
<meta http-equiv="refresh" content="5;url=https://hyogo-yakult.co.jp/field-team/">
<style>
  :root{ --green:#2E9E4F; --green-d:#1F7A3C; --ink:#1f2937; --sub:#6b7280; --bg:#f4f7f5; --card:#ffffff; --border:#e5e7eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
        background:var(--bg); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.2rem; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:20px; max-width:440px; width:100%;
         padding:2rem 1.6rem; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.08); }
  .badge{ display:inline-flex; align-items:center; gap:6px; background:#EAF6EE; color:var(--green-d);
          font-size:.78rem; font-weight:700; padding:5px 12px; border-radius:99px; margin-bottom:1.1rem; }
  h1{ font-size:1.35rem; line-height:1.5; margin:.2rem 0 .6rem; }
  p{ font-size:.95rem; line-height:1.8; color:var(--sub); margin:.4rem 0; }
  .btn{ display:block; margin:1.4rem 0 .4rem; background:var(--green); color:#fff; text-decoration:none;
        font-size:1.05rem; font-weight:700; padding:15px 18px; border-radius:14px; transition:background .15s; }
  .btn:active{ background:var(--green-d); }
  .url{ font-size:.82rem; color:var(--sub); word-break:break-all; margin-top:.2rem; }
  .note{ margin-top:1.3rem; padding-top:1.1rem; border-top:1px solid var(--border); font-size:.82rem; color:var(--sub); line-height:1.9; text-align:left; }
  .count{ font-weight:700; color:var(--green-d); }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">● アプリが移転しました</div>
    <h1>フィールドチーム管理アプリは<br>新しいURLへ移動しました</h1>
    <p><span id="count" class="count">5</span> 秒後に自動で移動します。<br>移動しない場合は下のボタンを押してください。</p>
    <a class="btn" href="https://hyogo-yakult.co.jp/field-team/">新しいアプリを開く</a>
    <div class="url">https://hyogo-yakult.co.jp/field-team/</div>
    <div class="note">
      ・ホーム画面にこのアプリを追加していた方は、<b>古いアイコンを削除</b>し、新しいアプリを開いて<b>「ホーム画面に追加」し直して</b>ください。<br>
      ・ブックマークも新しいURLに更新をお願いします。<br>
      ・以前の名前だけのログインは廃止され、<b>個人パスワード</b>でのログインに変わりました。
    </div>
  </div>
<script>
  // カウントダウン表示（meta refresh のフォールバックとしてJSでも遷移）
  var n = 5, el = document.getElementById('count');
  var t = setInterval(function(){
    n--; if(el) el.textContent = n;
    if(n <= 0){ clearInterval(t); location.replace('https://hyogo-yakult.co.jp/field-team/'); }
  }, 1000);
</script>
</body>
</html>
